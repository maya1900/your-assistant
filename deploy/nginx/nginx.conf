# Nginx 反向代理示例：把它复制成 /etc/nginx/sites-available/your-assistant.conf 等
#
# 假设你的部署布置：
#   - 用 `npm run build` 产出的 dist/ 放到 /var/www/your-assistant/dist
#   - 域名 your-domain.com 用 80 或 443 进来
#
# 关键点是那段 location /api/llm/：
#   - 从请求头 X-LLM-Base-URL 读取上游地址
#   - 用 $1 取出子路径转给上游
#   - proxy_buffering off 关闭缓冲，保证 SSE 流式逐字下发

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/your-assistant/dist;
    index index.html;

    # 静态资源 + SPA 兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # LLM 反代
    location ~ ^/api/llm/(.*)$ {
        # 用变量做 proxy_pass 时必须显式 resolver
        resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;

        # 从请求头读上游 base URL
        set $llm_base $http_x_llm_base_url;
        if ($llm_base = "") {
            add_header Content-Type application/json always;
            return 400 '{"error":{"message":"缺少 X-LLM-Base-URL header"}}';
        }

        # $1 是 location regex 抓到的子路径（如 chat/completions）
        # $is_args$args 把原始 query string 也带上
        proxy_pass $llm_base/$1$is_args$args;

        # SSE 流式必需：关闭代理缓冲
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 上游识别用的最小 header；剔掉我们自己的
        proxy_pass_request_headers on;
        proxy_set_header Host "";
        proxy_set_header X-LLM-Base-URL "";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;

        # 长超时，避免 LLM 长响应被截断
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        send_timeout 600s;
    }
}
